# Postgres
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=tinto
quarkus.datasource.password=tinto
quarkus.datasource.reactive.url=postgresql://localhost:5432/tinto
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/tinto

# Flyway
quarkus.flyway.migrate-at-start=true

# JWT
mp.jwt.verify.issuer=https://tinto.app
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem

# Auth providers — replace with real values
tinto.auth.google.client-id=your-google-client-id
tinto.auth.apple.client-id=your-apple-bundle-id
