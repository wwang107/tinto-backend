# Server
quarkus.http.host=0.0.0.0

# Database
quarkus.datasource.db-kind=postgresql
quarkus.flyway.migrate-at-start=true

# Dev Services — auto-starts a Postgres container in dev mode (no config needed)
quarkus.datasource.devservices.image-name=postgres:18-alpine

# Production — real database credentials
%prod.quarkus.datasource.username=tinto
%prod.quarkus.datasource.password=tinto
%prod.quarkus.datasource.reactive.url=postgresql://localhost:5432/tinto
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/tinto

# Test — PostgresTestResource manages its own container; disable Dev Services to avoid conflict
%test.quarkus.devservices.enabled=false
%test.quarkus.flyway.clean-disabled=false

# JWT
mp.jwt.verify.issuer=https://tinto.app
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem

# Auth providers — replace with real values
tinto.auth.google.client-id=297464887790-fjc2glduljmf65vg040b4pcae81jukic.apps.googleusercontent.com
tinto.auth.apple.client-id=your-apple-bundle-id
